<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Rent Management System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1f4ed8 0%, #2563eb 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        }

        .auth-header {
            margin-bottom: 32px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 1.85rem;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #64748b;
            font-size: 0.95rem;
        }

        .auth-form .form-group {
            margin-bottom: 20px;
        }

        .auth-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #1e293b;
            font-size: 0.95rem;
        }

        .auth-form input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #f8fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
            background: white;
        }

        .auth-form .btn {
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            background: #1f4ed8;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-form .btn:hover {
            background: #1e40af;
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(31, 78, 216, 0.18);
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: #1f4ed8;
            text-decoration: none;
            font-weight: 700;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 28px 20px;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Sign up to manage your properties</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn">Sign Up</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script type="module">
        import supabase from './supabase.js';
        window.handleSignup = async function(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMessage = document.getElementById('errorMessage');

            errorMessage.classList.remove('show');

            if (!fullName || !email || !password || !confirmPassword) {
                showError('All fields are required', errorMessage);
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters', errorMessage);
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match', errorMessage);
                return;
            }

            try {
                // Sign up with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email,
                    password
                });

                if (authError) {
                    showError(authError.message, errorMessage);
                    return;
                }

                if (!authData.user) {
                    showError('Failed to create account', errorMessage);
                    return;
                }

                // Create profile in the profiles table
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([
                        {
                            id: authData.user.id,
                            name: fullName,
                            email: email
                        }
                    ]);

                if (profileError) {
                    showError('Failed to create profile: ' + profileError.message, errorMessage);
                    return;
                }

                alert('Account created successfully! Please check your email to confirm.');
                window.location.href = 'login.html';
            } catch (error) {
                showError('An error occurred: ' + error.message, errorMessage);
            }
        }

        function showError(message, element) {
            element.textContent = message;
            element.classList.add('show');
        }
    </script>
</body>
</html>
